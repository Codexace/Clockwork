# Render Blueprint for deploying Clockwork as a static site.
# Push this repo to GitHub, then "New + > Blueprint" in Render and point at it,
# OR create a Static Site manually with the build command / publish dir below.
#
# Set the VITE_FIREBASE_* environment variables in the Render dashboard
# (Environment tab). They are baked into the static bundle at build time.
services:
  - type: web
    name: clockwork
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
    # Single-page app: route everything back to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
